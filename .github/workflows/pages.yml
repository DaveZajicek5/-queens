name: Deploy static site

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build static site and app icons
        run: |
          sudo apt-get update
          sudo apt-get install -y librsvg2-bin
          mkdir -p _site/icons
          rsync -a --exclude '_site' --exclude '.git' ./ _site/
          rsvg-convert -w 180 -h 180 icons/app-icon.svg -o _site/apple-touch-icon.png
          cp _site/apple-touch-icon.png _site/icons/apple-touch-icon.png
          rsvg-convert -w 192 -h 192 icons/app-icon.svg -o _site/icons/icon-192.png
          rsvg-convert -w 512 -h 512 icons/app-icon.svg -o _site/icons/icon-512.png

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

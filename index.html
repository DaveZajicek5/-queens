<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#111827" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Queens Archive</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #0f172a;
      --panel: #111827;
      --panel-soft: rgba(255,255,255,.07);
      --text: #e5e7eb;
      --muted: #9ca3af;
      --line: rgba(15,23,42,.28);
      --line-strong: rgba(15,23,42,.78);
      --danger: #fecaca;
      --danger-bg: rgba(239,68,68,.22);
      --ok: #bbf7d0;
      --hint: #fef08a;
      --focus: #38bdf8;
      --button-bg: rgba(255,255,255,.08);
      --button-border: rgba(255,255,255,.18);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top, #1e293b 0, var(--bg) 48rem);
      color: var(--text);
      display: flex;
      justify-content: center;
      padding: max(16px, env(safe-area-inset-top)) 16px max(24px, env(safe-area-inset-bottom));
    }
    main { width: min(760px, 100%); display: grid; gap: 16px; align-content: start; }
    header, .panel {
      background: color-mix(in srgb, var(--panel) 88%, transparent);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 22px;
      box-shadow: 0 20px 60px rgba(0,0,0,.28);
    }
    header { padding: 18px; display: grid; gap: 8px; }
    h1 { margin: 0; font-size: clamp(1.7rem, 7vw, 3rem); line-height: 1; }
    p { margin: 0; color: var(--muted); line-height: 1.45; }
    .toolbar { display: grid; gap: 10px; padding: 12px; }
    .toolbar-row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    select, button {
      border: 1px solid var(--button-border);
      background: var(--button-bg);
      color: var(--text);
      border-radius: 999px;
      min-height: 42px;
      padding: 0 14px;
      font: inherit;
    }
    select { flex: 1 1 220px; min-width: 0; }
    button { cursor: pointer; touch-action: manipulation; user-select: none; font-weight: 700; }
    button:hover { background: rgba(255,255,255,.14); }
    button:disabled { opacity: .58; cursor: wait; }
    .timer-pill, .stat-pill {
      min-height: 42px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 0 14px;
      border-radius: 999px;
      border: 1px solid var(--button-border);
      background: rgba(0,0,0,.12);
      font-variant-numeric: tabular-nums;
      font-weight: 800;
    }
    .board-wrap { padding: 12px; display: grid; justify-content: center; gap: 12px; }
    .board {
      display: grid;
      width: min(92vw, 540px);
      aspect-ratio: 1 / 1;
      border: 4px solid var(--line-strong);
      border-radius: 18px;
      overflow: hidden;
      background: rgba(255,255,255,.05);
      touch-action: manipulation;
    }
    .cell {
      position: relative;
      display: grid;
      place-items: center;
      border-style: solid;
      border-color: var(--line-strong);
      color: #111827;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      outline: none;
    }
    .cell::before, .cell::after { pointer-events: none; }
    .cell:focus-visible { box-shadow: inset 0 0 0 4px var(--focus); z-index: 2; }
    .cell[data-state="x"]::before,
    .cell[data-state="q"]::before {
      content: "";
      width: 46%;
      height: 46%;
      display: grid;
      place-items: center;
      border-radius: 9px;
      background: rgba(15, 23, 42, .82);
      box-shadow:
        inset 0 2px 0 rgba(255,255,255,.28),
        inset 0 -3px 0 rgba(0,0,0,.22),
        0 2px 4px rgba(0,0,0,.22);
      transform: rotate(-3deg);
      color: white;
      font-weight: 950;
      font-size: clamp(14px, 5.6vw, 30px);
      line-height: 1;
    }
    .cell[data-state="x"]::before { content: "×"; }
    .cell[data-state="q"]::before { content: "♛"; font-size: clamp(14px, 5.2vw, 28px); }
    .cell.error { box-shadow: inset 0 0 0 4px rgba(239, 68, 68, .75); z-index: 3; }
    .cell.error::after {
      content: "";
      position: absolute;
      inset: 0;
      background: var(--danger-bg);
    }
    .cell.hint { box-shadow: inset 0 0 0 5px rgba(250, 204, 21, .86); z-index: 4; }
    .cell.hint::after {
      content: "?";
      position: absolute;
      width: 40%;
      height: 40%;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: rgba(254, 240, 138, .92);
      color: #713f12;
      font-weight: 950;
      box-shadow: 0 2px 8px rgba(0,0,0,.22);
    }
    .cell.solution::after {
      content: "♛";
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: rgba(17, 24, 39, .35);
      font-size: clamp(20px, 7vw, 38px);
      font-weight: 900;
    }
    .status { min-height: 24px; text-align: center; color: var(--muted); font-weight: 700; }
    .status.ok { color: var(--ok); }
    .status.bad { color: var(--danger); }
    .meta, .stats { font-size: .9rem; text-align: center; color: var(--muted); line-height: 1.45; }
    .rating-panel {
      display: grid;
      gap: 8px;
      width: min(540px, 100%);
      margin: 0 auto;
      padding: 12px;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 16px;
      background: var(--panel-soft);
    }
    .rating-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-wrap: wrap; }
    .rating-row span { color: var(--muted); font-weight: 750; }
    .stars { display: inline-flex; gap: 4px; }
    .star {
      min-height: 34px;
      min-width: 34px;
      padding: 0;
      border-radius: 10px;
      font-size: 1rem;
      background: rgba(255,255,255,.08);
    }
    .star.active { background: rgba(250, 204, 21, .25); border-color: rgba(250, 204, 21, .72); color: #fde68a; }
    @media (max-width: 520px) {
      .toolbar-row { display: grid; grid-template-columns: 1fr 1fr; }
      .toolbar-row:first-child { grid-template-columns: 1fr; }
      select, .timer-pill, .stat-pill { width: 100%; }
      button { padding: 0 10px; }
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f8fafc;
        --panel: #ffffff;
        --panel-soft: rgba(15,23,42,.045);
        --text: #0f172a;
        --muted: #64748b;
        --line: rgba(15,23,42,.16);
        --line-strong: rgba(15,23,42,.58);
        --button-bg: white;
        --button-border: rgba(15,23,42,.16);
      }
      body { background: linear-gradient(#e0f2fe, #f8fafc 16rem); }
      .timer-pill, .stat-pill { background: rgba(15,23,42,.035); }
      .star.active { color: #92400e; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Queens Archive</h1>
      <p>Offline-playable Queens boards with archive mode, random generation, timer, hints, checks, ratings, and local stats. Tap a cell to cycle empty → square X → square queen.</p>
    </header>
    <section class="panel">
      <div class="toolbar">
        <div class="toolbar-row">
          <select id="puzzleSelect" aria-label="Puzzle"></select>
          <span id="timer" class="timer-pill">00:00</span>
        </div>
        <div class="toolbar-row">
          <select id="randomSize" aria-label="Random board size">
            <option value="7">Random 7×7</option>
            <option value="8" selected>Random 8×8</option>
            <option value="9">Random 9×9</option>
          </select>
          <button id="randomButton" type="button">New random</button>
          <button id="clearButton" type="button">Clear</button>
          <button id="checkButton" type="button">Check</button>
          <button id="hintButton" type="button">Hint</button>
          <button id="solutionButton" type="button">Show solution</button>
          <button id="exportStatsButton" type="button">Export stats</button>
        </div>
      </div>
      <div class="board-wrap">
        <div id="board" class="board" role="grid" aria-label="Queens board"></div>
        <div id="status" class="status"></div>
        <div id="ratingPanel" class="rating-panel" hidden></div>
        <div id="stats" class="stats"></div>
        <div id="meta" class="meta"></div>
      </div>
    </section>
  </main>
  <script type="module" src="./src/app.js"></script>
</body>
</html>
